<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Posts · Motamem Enhancer</title>
  <link rel="stylesheet" href="saved-posts.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 4h11a2 2 0 0 1 2 2v14l-5-3-5 3V6a2 2 0 0 0-2-2H6z"/>
            <path d="M6 4a2 2 0 0 0-2 2v13"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Saved Posts</h1>
          <span class="brand-sub">Motamem Blog Enhancer</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="export-btn" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 3v12M8 11l4 4 4-4M5 21h14"/>
          </svg>
          Export
        </button>
        <button id="import-btn" class="btn btn-secondary">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 15V3M8 7l4-4 4 4M5 21h14"/>
          </svg>
          Import
        </button>
        <input type="file" id="import-file" accept=".json" hidden>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" data-tab="toRead">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M2 5.5A2.5 2.5 0 0 1 4.5 3H11v16H4.5A2.5 2.5 0 0 0 2 21.5z"/>
          <path d="M22 5.5A2.5 2.5 0 0 0 19.5 3H13v16h6.5a2.5 2.5 0 0 1 2.5 2.5z"/>
        </svg>
        <span>To Read</span>
        <span class="count" id="toread-tab-count">0</span>
      </button>
      <button class="tab-btn" data-tab="read">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21.2 7 10 18.2 4.8 13"/>
        </svg>
        <span>Read</span>
        <span class="count" id="read-tab-count">0</span>
      </button>
    </div>

    <div class="content">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading posts…</p>
      </div>

      <div id="empty-state" class="empty-state" style="display: none;">
        <div class="empty-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7a2 2 0 0 1 2-2h7l2 3h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/>
          </svg>
        </div>
        <h2>No posts saved yet</h2>
        <p>Start saving posts from the blog and they'll appear here.</p>
      </div>

      <div id="posts-list" class="posts-list" style="display: none;"></div>

      <div id="pagination" class="pagination" style="display: none;"></div>
    </div>
  </div>

  <div id="notification" class="notification"></div>

  <script src="../shared/utils.js"></script>
  <script src="saved-posts.js"></script>
</body>
</html>
